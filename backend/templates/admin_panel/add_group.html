<div class="page" id="add-group" data-title="Add new Group">
  <div class="form-header">
    <h2>Add new Group</h2>
  </div>

  <div id="groupFormPanel" class="panel form-panel">
    <div id="groupFormMsg" style="margin-bottom:12px;"></div>

    <div class="form-row-3">
      <div class="form-item">
        <label>Group name</label>
        <input id="groupName" placeholder="Group name">
      </div>
      <div class="form-item">
        <label>Group username</label>
        <input id="groupUserName" placeholder="Group login username">
      </div>
      <div class="form-item">
        <label>Department</label>
        <select id="groupDept">
          <option value="">-- Select Department --</option>
          {% for dept in departments %}
          <option value="{{ dept.id }}">{{ dept.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row-3">
      <div class="form-item">
        <label>Group password</label>
        <input id="groupPassword" type="password" placeholder="Group login password">
      </div>
      <div class="form-item"></div>
      <div class="form-item"></div>
    </div>

    <div class="form-actions">
      <button id="addGroupFinalBtn" class="btn green oval large">Add Group</button>
    </div>
  </div>
</div>

<script>
(function() {
  document.getElementById('addGroupFinalBtn')?.addEventListener('click', function () {
    const name = document.getElementById('groupName').value.trim();
    const username = document.getElementById('groupUserName').value.trim();
    const password = document.getElementById('groupPassword').value;
    const dept = document.getElementById('groupDept').value;
    const msg = document.getElementById('groupFormMsg');

    if (!name || !username || !password) {
      msg.innerHTML = '<div class="alert alert-error">Group name, username, and password are required.</div>';
      return;
    }

    const csrf = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    fetch('/api/groups/', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
      body: JSON.stringify({
        name: name,
        shared_username: username,
        shared_password: password,
        department_id: dept || null
      }),
    })
      .then(r => r.json())
      .then(data => {
        if (data.id || data.group_id || data.message === 'Group created') {
          msg.innerHTML = '<div class="alert alert-success">Group created successfully.</div>';
          document.getElementById('groupName').value = '';
          document.getElementById('groupUserName').value = '';
          document.getElementById('groupPassword').value = '';
          document.getElementById('groupDept').value = '';
        } else {
          msg.innerHTML = `<div class="alert alert-error">${data.error || 'Failed to create group.'}</div>`;
        }
      })
      .catch(() => {
        msg.innerHTML = '<div class="alert alert-error">Network error.</div>';
      });
  });
})();
</script>
