<div class="page" id="userSelectPanel">
  <div class="form-header">
    <h2>Select Users</h2>
    <button class="btn back-btn"
            onclick="history.back()">
      <i class="fa-solid fa-angles-left"></i> Back
    </button>
  </div>

  <div class="panel form-panel">
    <div class="search-row">
      <input id="groupUserSearchInput" placeholder="Search users..."
             hx-get="{% url 'admin_panel:user_select' %}"
             hx-trigger="keyup changed delay:300ms"
             hx-target="#contentRoot"
             name="q"
             value="{{ query }}">
      <button class="btn">Search User</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAllUsers"></th>
            <th>Username</th>
            <th>Department</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td><input type="checkbox" class="user-select-cb" value="{{ user.pk }}"></td>
            <td>{{ user.username }}</td>
            <td>{{ user.department|default:"-" }}</td>
            <td>
              {% if user.is_active %}
                <span class="status-active">Active</span>
              {% else %}
                <span class="status-inactive">Inactive</span>
              {% endif %}
            </td>
          </tr>
          {% empty %}
          <tr><td colspan="4">No users found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <div class="form-actions">
      <button class="btn green oval large" id="addSelectedUsersBtn">Add Selected Users to Group</button>
    </div>
  </div>
</div>

<script>
(function() {
  document.getElementById('selectAllUsers')?.addEventListener('change', function() {
    document.querySelectorAll('.user-select-cb').forEach(cb => cb.checked = this.checked);
  });
})();
</script>
