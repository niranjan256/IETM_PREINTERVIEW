services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ietm
      POSTGRES_USER: ietm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ietm_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ..
      dockerfile: docker-deployment/Dockerfile
    restart: unless-stopped
    environment:
      IETM_MODE: network
      SERVE_SPA: "0"
      IETM_STATIC_ROOT: /app/static_root
      IETM_MEDIA_ROOT: /app/media
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: "*"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ietm
      DB_USER: ietm
      DB_PASSWORD: ${DB_PASSWORD:-ietm_secure_pass}
      DEBUG: "0"
    volumes:
      - static_vol:/app/static_root
      - media_vol:/app/media
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_vol:/app/static_root:ro
      - media_vol:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_vol:
  media_vol:
