server {
    listen 80;

    # Django admin/static files (CSS, fonts, JS for admin panel)
    location /static/ {
        alias /app/static_root/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Media files (images, PDFs, GLB models) — served directly, bypasses Python
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API calls — proxied to Django/Waitress on port 8001
    location /api/ {
        proxy_pass http://web:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Everything else — serve React SPA, let React Router handle the URL
    location / {
        root /app/static_root/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
