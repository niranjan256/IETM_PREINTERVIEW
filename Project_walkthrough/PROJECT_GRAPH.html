<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IETM Project Graph — Frontend & Backend</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    background: #1e293b; border-bottom: 1px solid #334155; padding: 8px 16px; height: 46px;
  }
  #toolbar h1 { font-size: 14px; font-weight: 600; color: #94a3b8; white-space: nowrap; }
  #search { flex: 1; max-width: 320px; padding: 4px 10px; border-radius: 6px;
            border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 13px; }
  #search::placeholder { color: #64748b; }
  .legend { display: flex; gap: 10px; align-items: center; font-size: 12px; color: #94a3b8; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-fe { background: #3b82f6; }
  .dot-be { background: #22c55e; }
  button.btn-reset {
    padding: 3px 10px; border-radius: 5px; border: 1px solid #475569;
    background: #1e293b; color: #94a3b8; font-size: 12px; cursor: pointer;
  }
  button.btn-reset:hover { background: #334155; }

  #canvas { position: fixed; top: 46px; left: 0; right: 0; bottom: 0; }

  .node circle.dir-circle {
    fill: #1e293b; stroke-width: 2px; r: 8;
  }
  .node text { font-size: 12px; dominant-baseline: middle; }

  .link { fill: none; stroke: #334155; stroke-width: 1.5px; }

  .file-card {
    background: #fef3c7; border-radius: 6px; border: 1px solid #d97706;
    padding: 0; overflow: hidden; font-family: monospace;
  }
  .file-card .fh {
    background: #d97706; color: #1c1917; font-size: 11px; font-weight: bold;
    padding: 3px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-card table { width: 100%; border-collapse: collapse; }
  .file-card tr { border-top: 1px solid #fde68a; }
  .file-card td { padding: 2px 6px; font-size: 10px; line-height: 1.35; color: #292524; }
  .file-card td.sym { color: #7c3aed; font-weight: 600; white-space: nowrap; }
  .file-card td.desc { color: #44403c; }

  .node-fe > circle { stroke: #3b82f6; }
  .node-be > circle { stroke: #22c55e; }
  .node-fe > text   { fill: #93c5fd; }
  .node-be > text   { fill: #86efac; }
  .node-root > circle { stroke: #f59e0b; }
  .node-root > text   { fill: #fcd34d; }

  .search-highlight rect { stroke: #facc15 !important; stroke-width: 3px !important; }
  .faded { opacity: 0.15; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>IETM Project Graph</h1>
  <input id="search" type="text" placeholder="Search files or functions…" />
  <div class="legend">
    <span class="dot dot-fe"></span>Frontend
    <span class="dot dot-be"></span>Backend
  </div>
  <button class="btn-reset" id="btn-reset">Reset zoom</button>
  <button class="btn-reset" id="btn-expand">Expand all</button>
  <button class="btn-reset" id="btn-collapse">Collapse all</button>
</div>
<svg id="canvas"></svg>

: "function", "params": "request", "returns": "", "desc": ""}, {"symbol": "topic_note_detail", "type": "function", "params": "request; topicId", "returns": "", "desc": "GET    /api/topic-notes/:topicId — get note for a specific topic"}, {"symbol": "topic_notes_list", "type": "function", "params": "request", "returns": "", "desc": "GET  /api/topic-notes — get all topic notes for authenticated user"}]}]}], "_subsystem": "backend"}]};

const CARD_W = 340;
const ROW_H  = 18;
const HDR_H  = 20;
const DIR_H  = 28;
const LINK_W = 220;

const svg = d3.select("#canvas");
const g   = svg.append("g");

// Zoom
const zoom = d3.zoom().scaleExtent([0.05, 3]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

let treeLayout, root, fileExpanded = new Set();

function cardHeight(node) {
  if (!node.data._file) return DIR_H;
  if (!fileExpanded.has(node.data._path)) return HDR_H + 8;   // collapsed: header only
  const n = (node.data.symbols || []).length;
  return HDR_H + Math.max(1, n) * ROW_H + 8;
}

function computeLayout() {
  // nodeSize([1, LINK_W]): use 1px as vertical unit so separation() returns pixels directly
  treeLayout = d3.tree()
    .nodeSize([1, LINK_W])
    .separation((a, b) => {
      const ha = cardHeight(a);
      const hb = cardHeight(b);
      return ha / 2 + hb / 2 + 20;   // pixels between centres of adjacent nodes
    });

  root = d3.hierarchy(RAW);
  // start all dir nodes collapsed beyond depth 1
  root.each(d => {
    if (d.depth > 1 && !d.data._file && d.children) {
      d._children = d.children;
      d.children = null;
    }
  });
}

function subsystem(d) {
  let n = d;
  while (n) {
    if (n.data._subsystem) return n.data._subsystem;
    n = n.parent;
  }
  return null;
}

function update() {
  const W = window.innerWidth, H = window.innerHeight - 46;
  svg.attr("width", W).attr("height", H);

  treeLayout(root);

  const nodes = root.descendants();
  const links = root.links();

  // ── Links ──────────────────────────────────────────────────────────────────
  const link = g.selectAll(".link").data(links, d => d.target.data.name + d.target.depth);
  link.enter().append("path").attr("class","link")
    .merge(link)
    .attr("d", d => {
      const sx = d.source.y, sy = d.source.x;
      const tx = d.target.y, ty = d.target.x;
      return `M${sx},${sy} C${(sx+tx)/2},${sy} ${(sx+tx)/2},${ty} ${tx},${ty}`;
    });
  link.exit().remove();

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const node = g.selectAll(".node").data(nodes, d => d.data._path || d.data.name + d.depth);

  const nodeEnter = node.enter().append("g")
    .attr("class", d => {
      const sub = subsystem(d);
      if (d.depth === 0) return "node node-root";
      return "node node-" + (sub || "root");
    })
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .style("cursor", "pointer")
    .on("click", (_, d) => {
      if (d.data._file) {
        if (fileExpanded.has(d.data._path)) fileExpanded.delete(d.data._path);
        else fileExpanded.add(d.data._path);
      } else {
        if (d.children) { d._children = d.children; d.children = null; }
        else            { d.children = d._children;  d._children = null; }
      }
      update();
    });

  // dir/root nodes: circle + label
  nodeEnter.filter(d => !d.data._file)
    .append("circle")
    .attr("r", d => d.depth === 0 ? 12 : 8)
    .attr("fill", d => {
      if (d.depth === 0) return "#f59e0b";
      const sub = subsystem(d);
      return sub === "frontend" ? "#3b82f6" : sub === "backend" ? "#22c55e" : "#94a3b8";
    });

  nodeEnter.filter(d => !d.data._file)
    .append("text")
    .attr("x", d => (d.children || d._children) ? -14 : 14)
    .attr("text-anchor", d => (d.children || d._children) ? "end" : "start")
    .attr("fill", "#e2e8f0")
    .attr("font-size", d => d.depth === 0 ? 14 : 12)
    .attr("font-weight", d => d.depth <= 1 ? "bold" : "normal")
    .text(d => d.data.name);

  // file nodes: foreignObject card
  nodeEnter.filter(d => d.data._file)
    .append("foreignObject")
    .attr("x", 0)
    .attr("y", d => -cardHeight(d)/2)
    .attr("width", CARD_W)
    .attr("height", d => cardHeight(d))
    .append("xhtml:div")
    .attr("class", d => "file-card")
    .html(d => {
      const syms = d.data.symbols || [];
      const sub  = subsystem(d);
      const color = sub === "frontend" ? "#2563eb" : "#16a34a";
      const expanded = fileExpanded.has(d.data._path);
      const fname = d.data.name;
      if (!expanded) {
        return `<div class="fh" style="background:${color}">${fname} (${syms.length} symbols)</div>`;
      }
      const rows = syms.map(s => {
        const sig = s.params ? `${s.symbol}(${s.params})` : s.symbol;
        const ret = s.returns ? ` → ${s.returns}` : "";
        const desc = s.desc || "";
        return `<tr><td class="sym">${he(sig+ret)}</td><td class="desc">${he(desc)}</td></tr>`;
      }).join("");
      return `<div class="fh" style="background:${color}">${fname} ▾</div><table>${rows}</table>`;
    });

  // merge + transition
  const merged = node.merge(nodeEnter);
  merged.transition().duration(250)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  // re-render file cards on every update (handles expand/collapse height change)
  merged.filter(d => d.data._file).each(function(d) {
    const fo = d3.select(this).select("foreignObject");
    const h = cardHeight(d);
    fo.attr("y", -h/2).attr("height", h);
    const syms = d.data.symbols || [];
    const sub  = subsystem(d);
    const color = sub === "frontend" ? "#2563eb" : "#16a34a";
    const expanded = fileExpanded.has(d.data._path);
    const fname = d.data.name;
    let html;
    if (!expanded) {
      html = `<div class="fh" style="background:${color}">${fname} (${syms.length} symbols)</div>`;
    } else {
      const rows = syms.map(s => {
        const sig = s.params ? `${s.symbol}(${s.params})` : s.symbol;
        const ret = s.returns ? ` → ${s.returns}` : "";
        return `<tr><td class="sym">${he(sig+ret)}</td><td class="desc">${he(s.desc||"")}</td></tr>`;
      }).join("");
      html = `<div class="fh" style="background:${color}">${fname} ▾</div><table>${rows}</table>`;
    }
    fo.select("div").html(html);
  });

  node.exit().remove();
}

function he(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Initialise
computeLayout();
update();

// Center view on load
setTimeout(() => {
  const bounds = g.node().getBBox();
  const W = window.innerWidth, H = window.innerHeight - 46;
  const scale = Math.min(0.8, Math.min(W / bounds.width, H / bounds.height)) * 0.9;
  const tx = W/2 - scale*(bounds.x + bounds.width/2);
  const ty = H/2 - scale*(bounds.y + bounds.height/2);
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}, 100);

// Reset zoom
document.getElementById("btn-reset").addEventListener("click", () => {
  const bounds = g.node().getBBox();
  const W = window.innerWidth, H = window.innerHeight - 46;
  const scale = Math.min(0.8, Math.min(W / bounds.width, H / bounds.height)) * 0.9;
  const tx = W/2 - scale*(bounds.x + bounds.width/2);
  const ty = H/2 - scale*(bounds.y + bounds.height/2);
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
});

// Expand all
document.getElementById("btn-expand").addEventListener("click", () => {
  root.each(d => { if (d._children) { d.children = d._children; d._children = null; } });
  update();
});

// Collapse all
document.getElementById("btn-collapse").addEventListener("click", () => {
  root.each(d => {
    if (d.depth > 1 && d.children) { d._children = d.children; d.children = null; }
  });
  fileExpanded.clear();
  update();
});

// Search
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    g.selectAll(".node").classed("faded", false).classed("search-highlight", false);
    return;
  }
  g.selectAll(".node").each(function(d) {
    const name = (d.data.name || "").toLowerCase();
    const syms = (d.data.symbols || []).map(s => s.symbol.toLowerCase() + " " + s.desc.toLowerCase()).join(" ");
    const match = name.includes(q) || syms.includes(q);
    d3.select(this).classed("faded", !match).classed("search-highlight", match);
  });
});

window.addEventListener("resize", () => { update(); });
</script>
</body>
